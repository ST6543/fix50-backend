<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Onderhoud – Fix50</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header>Fix50 – Onderhoud</header>

<div class="container">
  <h2>Jouw scooters</h2>
  <div id="list"></div>
  <a class="link" href="home.html">Terug naar home</a>
</div>

<script>
function requireLogin() {
  if (!localStorage.getItem("token")) {
    window.location = "login.html";
  }
}
requireLogin();

async function loadScooters() {
  const res = await fetch("/api/onderhoud", {
    headers: { "Authorization": "Bearer " + localStorage.getItem("token") }
  });
  const data = await res.json();
  const list = document.getElementById("list");

  if (!data.length) {
    list.innerHTML = "<p>Geen scooters gevonden.</p>";
    return;
  }

  list.innerHTML = data.map(s => `
    <div style="border-bottom:1px solid #444; padding:10px 0;">
      <strong>${s.merk} ${s.model}</strong><br>
      Kenteken: ${s.kenteken || "-"}<br>
      Bouwjaar: ${s.bouwjaar || "-"}
    </div>
  `).join("");
}

loadScooters();
</script>
</body>
</html>
