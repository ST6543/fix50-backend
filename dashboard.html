<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Mijn Account – Fix50</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: white;
        }

        header {
            background-color: #ff7b00;
            padding: 20px;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
        }

        .container {
            max-width: 600px;
            margin: 40px auto;
            background-color: #262626;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0,0,0,0.4);
        }

        h2, h3 {
            color: #ff7b00;
            margin-top: 0;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 8px;
            border: none;
            background-color: #333;
            color: white;
        }

        .btn {
            width: 100%;
            display: block;
            background-color: #ff7b00;
            color: white;
            padding: 12px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            text-align: center;
            margin-top: 20px;
            cursor: pointer;
        }

        .btn:hover {
            background-color: #e56f00;
        }

        .logout {
            background-color: #444;
            margin-top: 10px;
        }

        .scooter-item {
            background-color: #333;
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
        }

        #msg {
            margin-top: 15px;
            min-height: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

<header>Fix50 – Mijn Account</header>

<div class="container">

    <h2>Welkom, <span id="userName"></span></h2>

    <button class="btn logout" id="logoutBtn">Uitloggen</button>

    <hr style="margin: 30px 0; border-color: #444;">

    <h3>Jouw voertuigen</h3>
    <div id="scooterList"></div>
    <p id="noScooters" style="color:#aaa;">Je hebt nog geen voertuigen opgeslagen.</p>

    <hr style="margin: 30px 0; border-color: #444;">

    <h3>Nieuw voertuig toevoegen</h3>

    <input id="merk" type="text" placeholder="Merk (bijv. Piaggio)">
    <input id="model" type="text" placeholder="Model (bijv. Zip)">
    <input id="kenteken" type="text" placeholder="Kenteken (optioneel)">
    <input id="bouwjaar" type="number" placeholder="Bouwjaar (optioneel)">

    <button class="btn" id="saveScooterBtn">Voertuig opslaan</button>

    <div id="msg"></div>

</div>

<script src="dashboard.js"></script>
</body>
</html>
