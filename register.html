<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Registreren – Fix50</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <img src="logo.png" alt="Fix50 Logo">
</header>

<div class="form-container">
    <h2>Account aanmaken</h2>

    <input id="email" type="email" placeholder="E-mail">
    <input id="password" type="password" placeholder="Wachtwoord">

    <button onclick="register()">Registreren</button>

    <p>Heb je al een account? <a href="login.html">Inloggen</a></p>
</div>

<script>
const API_BASE = "https://fix50-backend-login-en-registratie.onrender.com";

async function register() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const res = await fetch(`${API_BASE}/api/register`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (data.success) {
        alert("Account aangemaakt!");
        location.href = "login.html";
    } else {
        alert(data.error);
    }
}
</script>
</body>
</html>
