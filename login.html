<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Inloggen – Fix50</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <img src="logo.png" alt="Fix50 Logo">
</header>

<div class="form-container">
    <h2>Inloggen</h2>

    <input id="email" type="email" placeholder="E-mail">
    <input id="password" type="password" placeholder="Wachtwoord">

    <button onclick="login()">Inloggen</button>

    <p>Nog geen account? <a href="register.html">Registreren</a></p>
</div>

<script>
const API_BASE = "https://fix50.onrender.com";

async function login() {
    console.log("login() gestart");

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const res = await fetch(`${API_BASE}/api/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
    });

    const data = await res.json();
    console.log("API antwoord:", data);

    if (data.token) {
        localStorage.setItem("token", data.token);
        location.href = "scooter.html";
    } else {
        alert(data.error || "Er ging iets mis");
    }
}
</script>

</body>
</html>
